<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Honeymoon Resort Map</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --cream:#faf6f0; --sand:#e8ddd0; --blush:#c9a98a; --deep:#2c1f14;
  --ocean:#3a6b7a; --gold:#b8965a; --text:#3d2e22; --muted:#7a6a5a;
  --jamaica:#b8965a; --aruba:#3a6b7a; --costarica:#2d6a4f; --claude:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);}
.page{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}
h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--deep);margin-bottom:4px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:24px;font-weight:300;}

/* FILTER TABS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{padding:7px 18px;border-radius:100px;border:1.5px solid var(--sand);background:#fff;
  font-family:'Jost',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.filter-btn:hover{border-color:var(--ocean);color:var(--ocean);}
.filter-btn.active{color:#fff;border-color:transparent;}
.filter-btn[data-f="all"].active{background:var(--deep);}
.filter-btn[data-f="jamaica"].active{background:var(--jamaica);}
.filter-btn[data-f="aruba"].active{background:var(--aruba);}
.filter-btn[data-f="costa-rica"].active{background:var(--costarica);}
.filter-btn[data-f="claude"].active{background:var(--claude);}

/* MAP */
#map{width:100%;height:480px;border-radius:14px;border:1.5px solid var(--sand);z-index:1;}

/* CARD PANEL */
.panel{display:grid;grid-template-columns:1fr 340px;border:1.5px solid var(--sand);border-top:none;
  border-radius:0 0 14px 14px;background:#fff;overflow:hidden;margin-top:-4px;}
@media(max-width:700px){.panel{grid-template-columns:1fr;}}

/* TABLE */
.tbl-wrap{overflow:auto;max-height:320px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--deep);color:#fff;padding:10px 14px;text-align:left;
  font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:500;position:sticky;top:0;}
tbody tr{cursor:pointer;transition:background 0.15s;}
tbody tr:hover td{background:#faf6f0;}
tbody tr.selected td{background:#f0f4f7;}
td{padding:10px 14px;border-bottom:1px solid var(--sand);vertical-align:middle;color:var(--text);}
tr:last-child td{border-bottom:none;}
.td-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle;flex-shrink:0;}
.td-name{font-weight:500;color:var(--deep);}
.td-price{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ocean);}
.td-hearts{color:var(--blush);font-size:11px;letter-spacing:1px;}

/* DETAIL CARD */
.detail{border-left:1.5px solid var(--sand);display:flex;flex-direction:column;}
.detail-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;
  display:flex;flex-direction:column;align-items:center;gap:10px;font-weight:300;}
.detail-empty .icon{font-size:36px;}
.card{display:none;flex-direction:column;}
.card.show{display:flex;}
.card-head{padding:16px 20px;border-bottom:1px solid var(--sand);}
.card-icon-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.card-emoji{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--deep);line-height:1.2;}
.card-loc{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:0.5px;}
.badge{display:inline-block;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:100px;margin-top:4px;background:#ede8fb;color:#5b21b6;}
.card-body{padding:12px 20px;flex:1;}
.card-row{display:flex;justify-content:space-between;align-items:baseline;
  font-size:12px;padding:7px 0;border-bottom:1px solid var(--sand);color:var(--muted);}
.card-row:last-of-type{border-bottom:none;}
.card-row .lbl{font-weight:500;color:var(--deep);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;min-width:55px;}
.card-row .val{text-align:right;color:var(--text);font-size:12px;}
.card-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--deep);}
.card-hearts{color:var(--blush);font-size:13px;letter-spacing:2px;}
.bullets{list-style:none;padding:10px 0 0;}
.bullets li{font-size:12px;color:var(--muted);padding:4px 0 4px 16px;position:relative;line-height:1.5;}
.bullets li::before{content:"—";position:absolute;left:0;color:var(--blush);}
.card-footer{padding:12px 20px 16px;border-top:1px solid var(--sand);}
.card-link{font-size:12px;color:var(--ocean);text-decoration:none;font-weight:500;}
.card-link:hover{text-decoration:underline;}

/* LEAFLET OVERRIDES */
.leaflet-container{font-family:'Jost',sans-serif;}
.custom-pin{width:28px;height:28px;border-radius:50%;border:3px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;
  transition:transform 0.15s;}
.custom-pin:hover{transform:scale(1.2);}
.custom-pin.pulse{animation:pin-pulse 2s ease-in-out infinite;}
@keyframes pin-pulse{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,0.25),0 0 0 0 rgba(184,150,90,0.4)}
  50%{box-shadow:0 2px 8px rgba(0,0,0,0.25),0 0 0 10px rgba(184,150,90,0)}}
.leaflet-popup-content-wrapper{border-radius:10px;border:1px solid var(--sand);box-shadow:0 4px 20px rgba(44,31,20,0.12);}
.leaflet-popup-tip{background:#fff;}
.popup-inner{font-family:'Jost',sans-serif;padding:2px 4px;}
.popup-name{font-weight:500;font-size:13px;color:var(--deep);margin-bottom:2px;}
.popup-loc{font-size:11px;color:var(--muted);}
.popup-price{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--ocean);margin-top:4px;}
</style>
</head>
<body>
<div class="page">
  <h1>Your Amazing Honeymoon</h1>
  <p class="sub">9 resorts across Jamaica, Aruba &amp; Costa Rica &mdash; click a pin or row to explore</p>

  <div class="filters">
    <button class="filter-btn active" data-f="all">All Resorts</button>
    <button class="filter-btn" data-f="jamaica">&#127464;&#127474; Jamaica</button>
    <button class="filter-btn" data-f="aruba">&#127462;&#127484; Aruba</button>
    <button class="filter-btn" data-f="costa-rica">&#127464;&#127479; Costa Rica</button>
    <button class="filter-btn" data-f="claude">&#10022; Claude Picks</button>
  </div>

  <div id="map"></div>

  <div class="panel">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Resort</th><th>Location</th><th>Price</th><th>Score</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="detail">
      <div class="detail-empty" id="empty">
        <div class="icon">&#128205;</div>
        <div style="font-weight:500;color:var(--deep);">Select a resort</div>
        <div>Click any pin on the map<br>or a row in the table</div>
      </div>
      <div class="card" id="card">
        <div class="card-head" id="card-head"></div>
        <div class="card-body" id="card-body"></div>
        <div class="card-footer" id="card-footer"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
window.addEventListener("load", function() {
var mJOBS = [
  { id:"sandals-ochi", s:"jamaica", lat:18.404, lng:-77.102,
    n:"Sandals Ochi Resort", r:"Riviera Honeymoon Luxury Suite",
    loc:"Ocho Rios, Jamaica", d:"$4,056 for 7 nights", yr:2025, c:"#b8965a",
    score:5, claude:false, url:"https://www.sandals.com/ochi/", emoji:"&#127958;",
    b:["Couples-only all-inclusive on Jamaica's north coast",
       "Butler service on upgrade - arrange private beach dinner",
       "Complimentary honeymoon amenity package at check-in"] },
  { id:"iberostar-rh", s:"jamaica", lat:18.490, lng:-77.912,
    n:"Iberostar Rose Hall Suites", r:"Junior Suite Ocean Room",
    loc:"Montego Bay, Jamaica", d:"$3,131 for 7 nights", yr:2025, c:"#b8965a",
    score:4, claude:false, url:"https://www.iberostar.com/en/hotels/montego-bay/iberostar-selection-rose-hall-suites", emoji:"&#127754;",
    b:["Request west-facing room for spectacular MoBay sunsets",
       "Star Prestige section offers private pool lounge access",
       "Best-value Jamaica option with gourmet dining included"] },
  { id:"couples-negril", s:"jamaica", lat:18.268, lng:-78.352,
    n:"Couples Negril", r:"Beachfront Suite",
    loc:"Negril, Jamaica", d:"$3,304 for 7 nights", yr:2025, c:"#7c3aed",
    score:5, claude:true, url:"https://www.couples.com/resort/couples-negril", emoji:"&#129343;",
    b:["Free scuba diving and sunset catamaran cruise included",
       "7-Mile Beach - one of the Caribbean's finest",
       "Complimentary honeymoon package with 6+ night stay"] },
  { id:"joia-aruba", s:"aruba", lat:12.577, lng:-70.052,
    n:"JOIA Aruba by Iberostar", r:"Master Butler Suite King",
    loc:"Noord, Aruba", d:"$11,752 for 7 nights", yr:2025, c:"#3a6b7a",
    score:5, claude:false, url:"https://www.iberostar.com/en/hotels/eagle-beach/joia-aruba-by-iberostar", emoji:"&#127796;",
    b:["Private butler arranges candlelit dinners and cabanas",
       "Eagle Beach - consistently rated the world's best beach",
       "October: perfect weather 88F, only ~3 rain days"] },
  { id:"secrets-bb", s:"aruba", lat:12.432, lng:-69.898,
    n:"Secrets Baby Beach Aruba", r:"Preferred Club Jr Suite Swim Out",
    loc:"San Nicolas, Aruba", d:"$9,715 for 7 nights", yr:2025, c:"#3a6b7a",
    score:5, claude:false, url:"https://www.hyattinclusivecollection.com/en/resorts-hotels/secrets/aruba/baby-beach-aruba", emoji:"&#127946;",
    b:["Swim directly from your terrace into the private pool",
       "Preferred Club: a la carte dining and premium in-room spirits",
       "Newer property with modern adults-only design"] },
  { id:"riu-palace", s:"aruba", lat:12.591, lng:-70.082,
    n:"Riu Palace Antillas", r:"Junior Suite Ocean View - Adults Only",
    loc:"Palm Beach, Aruba", d:"$3,990 for 7 nights", yr:2025, c:"#7c3aed",
    score:4, claude:true, url:"https://www.riu.com/en/hotel/aruba/palmbeach/hotel-riu-palace-antillas", emoji:"&#127920;",
    b:["Adults-only on same Palm Beach strip as JOIA at a third the price",
       "24h all-inclusive with 5 restaurants and casino",
       "Exchange privileges with adjacent Riu Palace Aruba"] },
  { id:"riu-guanacaste", s:"costa-rica", lat:10.353, lng:-85.652,
    n:"Riu Guanacaste", r:"Deluxe Room Pool View",
    loc:"Guanacaste, Costa Rica", d:"$2,342 for 7 nights", yr:2025, c:"#2d6a4f",
    score:3, claude:false, url:"https://www.riu.com/en/hotel/costa-rica/guanacaste/hotel-riu-guanacaste", emoji:"&#127807;",
    b:["Most affordable option - use savings for zip-lining and horseback on the beach",
       "Guanacaste is dry season in October - ideal conditions",
       "Ask concierge for in-room honeymoon decoration on arrival"] },
  { id:"secrets-papagayo", s:"costa-rica", lat:10.582, lng:-85.718,
    n:"Secrets Papagayo Costa Rica", r:"Preferred Club Bungalow Suite, Ocean Front",
    loc:"Papagayo, Costa Rica", d:"$6,572 for 7 nights", yr:2025, c:"#2d6a4f",
    score:5, claude:false, url:"https://www.hyattinclusivecollection.com/en/resorts-hotels/secrets/costa-rica/papagayo-costa-rica", emoji:"&#129436;",
    b:["Bungalow-style suites feel secluded from the main resort",
       "World-class snorkeling and sailing from Papagayo Peninsula",
       "Book outdoor activities for mornings - clearest skies"] },
  { id:"nayara-springs", s:"costa-rica", lat:10.467, lng:-84.702,
    n:"Nayara Springs", r:"Private Villa - Natural Hot Spring Plunge Pool",
    loc:"Arenal Volcano, Costa Rica", d:"$6,580 for 7 nights", yr:2025, c:"#7c3aed",
    score:5, claude:true, url:"https://nayarasprings.com", emoji:"&#127755;",
    b:["Every villa has a private thermal hot spring plunge pool",
       "Rated the most romantic resort in Costa Rica",
       "Sloths, volcano views, and rainforest sounds every night"] }
];

var destBg = { jamaica:"#fdf6ec", aruba:"#eaf4f4", "costa-rica":"#eaf4ee" };
var activeFilter = "all";
var selectedId = null;
var markers = {};

var map = L.map("map", { zoomControl:true, scrollWheelZoom:true })
            .setView([13.5, -76], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>",
  maxZoom:18
}).addTo(map);

function makeIcon(job) {
  var col = job.claude ? "#7c3aed" : job.c;
  var pulse = job.score === 5 ? " pulse" : "";
  return L.divIcon({
    className:"",
    html:'<div class="custom-pin' + pulse + '" style="background:' + col + ';" title="' + job.n + '"></div>',
    iconSize:[28,28],
    iconAnchor:[14,14],
    popupAnchor:[0,-18]
  });
}

mJOBS.forEach(function(job) {
  var marker = L.marker([job.lat, job.lng], { icon: makeIcon(job) }).addTo(map);
  marker.bindPopup(
    '<div class="popup-inner">' +
    '<div class="popup-name">' + job.n + (job.claude ? " &#10022;" : "") + '</div>' +
    '<div class="popup-loc">' + job.loc + '</div>' +
    '<div class="popup-price">' + job.d.split(" for ")[0] + '</div>' +
    '</div>', { maxWidth:220 }
  );
  marker.on("click", function() { selectResort(job.id); });
  markers[job.id] = marker;
});

function selectResort(id) {
  selectedId = id;
  var job = mJOBS.find(function(j){ return j.id === id; });
  if (!job) return;

  // Fly map to pin
  map.flyTo([job.lat, job.lng], 10, { duration:1.2 });
  markers[id].openPopup();

  // Highlight table row
  document.querySelectorAll("tbody tr").forEach(function(tr){
    tr.classList.toggle("selected", tr.dataset.id === id);
  });

  // Build card
  var col = job.claude ? "#7c3aed" : job.c;
  var bg  = job.claude ? "#f0eefb" : destBg[job.s];
  var hearts = "&#9829;".repeat(job.score) + "&#9825;".repeat(5 - job.score);
  var badge  = job.claude ? '<div class="badge">&#10022; Claude Pick</div>' : "";

  document.getElementById("empty").style.display = "none";
  var card = document.getElementById("card");
  card.classList.add("show");

  document.getElementById("card-head").style.background = bg;
  document.getElementById("card-head").style.borderBottom = "1px solid var(--sand)";
  document.getElementById("card-head").innerHTML =
    '<div class="card-icon-row">' +
      '<div class="card-emoji" style="background:' + col + '22;">' + job.emoji + '</div>' +
      '<div>' +
        '<div class="card-title">' + job.n + '</div>' +
        '<div class="card-loc">&#128205; ' + job.loc + '</div>' +
        badge +
      '</div>' +
    '</div>';

  document.getElementById("card-body").innerHTML =
    '<div class="card-row"><span class="lbl">Suite</span><span class="val" style="max-width:170px;text-align:right;">' + job.r + '</span></div>' +
    '<div class="card-row"><span class="lbl">Price</span><span class="card-price">' + job.d.split(" for ")[0] + '</span></div>' +
    '<div class="card-row"><span class="lbl">Dates</span><span class="val">Oct 19&ndash;26, 2025</span></div>' +
    '<div class="card-row"><span class="lbl">Score</span><span class="card-hearts">' + hearts + '</span></div>' +
    '<ul class="bullets">' + job.b.map(function(b){ return '<li>' + b + '</li>'; }).join("") + '</ul>';

  document.getElementById("card-footer").innerHTML =
    '<a href="' + job.url + '" class="card-link" target="_blank">Visit website &#8599;</a>';
}

function buildTable() {
  var tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  mJOBS.forEach(function(job) {
    var show = activeFilter === "all"
      || (activeFilter === "claude" && job.claude)
      || job.s === activeFilter;
    if (!show) return;
    var col = job.claude ? "#7c3aed" : job.c;
    var tr = document.createElement("tr");
    tr.dataset.id = job.id;
    if (job.id === selectedId) tr.classList.add("selected");
    tr.innerHTML =
      '<td><span class="td-dot" style="background:' + col + '"></span>' +
        '<span class="td-name">' + job.n + (job.claude ? " &#10022;" : "") + '</span></td>' +
      '<td style="color:var(--muted);font-size:11px;">' + job.loc + '</td>' +
      '<td class="td-price">' + job.d.split(" for ")[0] + '</td>' +
      '<td class="td-hearts">' + "&#9829;".repeat(job.score) + "&#9825;".repeat(5 - job.score) + '</td>';
    tr.addEventListener("click", function() { selectResort(job.id); });
    tbody.appendChild(tr);
  });
}

function applyFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(function(b){
    b.classList.toggle("active", b.dataset.f === f);
  });
  mJOBS.forEach(function(job) {
    var show = f === "all" || (f === "claude" && job.claude) || job.s === f;
    var m = markers[job.id];
    if (show) { m.addTo(map); } else { m.remove(); }
  });
  buildTable();
  if (f !== "all") {
    var visible = mJOBS.filter(function(j){
      return f === "claude" ? j.claude : j.s === f;
    });
    if (visible.length) {
      var bounds = L.latLngBounds(visible.map(function(j){ return [j.lat, j.lng]; }));
      map.flyToBounds(bounds, { padding:[60,60], duration:1 });
    }
  } else {
    map.flyTo([13.5, -76], 5, { duration:1 });
  }
}

document.querySelectorAll(".filter-btn").forEach(function(b){
  b.addEventListener("click", function(){ applyFilter(b.dataset.f); });
});

buildTable();
}); // end window.onload
</script>
</body>
</html>
